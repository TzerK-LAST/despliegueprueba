name: Deploy production
on:
  push:
    branches:
      - main
permissions:
  packages: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile -t ghcr.io/${{ env.REPO_LOWER }}:latest .
          docker push ghcr.io/${{ env.REPO_LOWER }}:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Convert repository name to lowercase
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: 204.168.220.65
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            docker login ghcr.io -u "tzerk-last" -p ${{ secrets.TOKEN }}
            docker pull ghcr.io/${{ env.REPO_LOWER }}:latest
            docker stop despliegueprueba || true
            docker rm despliegueprueba || true
            docker run -d --name despliegueprueba \
                         -p 8095:8080 \
                         ghcr.io/${{ env.REPO_LOWER }}:latest
